<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArbitrageRadar — Market Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#F59E0B;--accent-l:#FBBF24;--accent-d:#92400E;
  --accent-bg:#FFFBEB;--accent-bd:#FDE68A;
  --dark:#0F172A;--mid:#1E293B;--slate:#475569;
  --muted:#94A3B8;--light:#F8FAFC;--white:#FFFFFF;
  --border:#E2E8F0;
  --red:#EF4444;--red-bg:#FEF2F2;
  --green:#10B981;--green-bg:#ECFDF5;
  --blue:#3B82F6;--blue-bg:#EFF6FF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--dark);min-height:100vh;}
.bg-layer{position:fixed;inset:0;background:
  radial-gradient(ellipse 70% 60% at 5% 15%,rgba(245,158,11,.14) 0%,transparent 55%),
  radial-gradient(ellipse 50% 70% at 95% 85%,rgba(245,158,11,.07) 0%,transparent 55%),
  linear-gradient(160deg,#0F172A 0%,#1E293B 50%,#0F172A 100%);z-index:0;}
.grid-overlay{position:fixed;inset:0;background-image:
  linear-gradient(rgba(245,158,11,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(245,158,11,.03) 1px,transparent 1px);
  background-size:40px 40px;z-index:0;}
.outer{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 20px 80px;}
.user-bar{display:flex;align-items:center;justify-content:flex-end;gap:12px;margin-bottom:12px;}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:100px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fff;font-size:12px;}
.user-badge span{color:var(--accent-l);font-weight:600;}
.logout-btn{padding:6px 14px;border-radius:100px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#FCA5A5;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.nav-tabs{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.nav-tab{padding:8px 20px;border-radius:100px;font-size:12px;font-weight:600;text-decoration:none;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:var(--muted);transition:all .2s;}
.nav-tab:hover{border-color:rgba(255,255,255,.3);color:#fff;}
.nav-tab.active{background:var(--accent);color:white;border-color:var(--accent);}
.header{text-align:center;margin-bottom:24px;}
.logo-mark{display:inline-flex;align-items:center;gap:12px;margin-bottom:14px;}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent-d),var(--accent));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 28px rgba(245,158,11,.45);}
.logo-text{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;}
.logo-text span{color:var(--accent-l);}
.header h1{font-family:'DM Serif Display',serif;font-size:24px;color:#fff;margin-bottom:6px;}
.header p{color:#94A3B8;font-size:13px;}

/* Signal cards */
.signal-list{display:flex;flex-direction:column;gap:10px;}
.signal-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px 20px;transition:all .2s;}
.signal-card:hover{border-color:rgba(245,158,11,.3);}
.signal-card.signal-HOT{border-left:4px solid var(--red);}
.signal-card.signal-WARM{border-left:4px solid var(--accent);}
.signal-card.signal-WATCH{border-left:4px solid var(--blue);}
.signal-card.signal-COLLECTING{border-left:4px solid var(--muted);}
.signal-card.signal-LOW{border-left:4px solid rgba(255,255,255,.1);}

.signal-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.signal-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.5px;}
.badge-HOT{background:rgba(239,68,68,.15);color:#FCA5A5;}
.badge-WARM{background:rgba(245,158,11,.15);color:var(--accent-l);}
.badge-WATCH{background:rgba(59,130,246,.15);color:#60A5FA;}
.badge-COLLECTING{background:rgba(255,255,255,.05);color:var(--muted);}
.badge-LOW{background:rgba(255,255,255,.03);color:var(--muted);}
.signal-keyword{flex:1;font-size:15px;font-weight:700;color:#fff;}
.signal-score{font-size:20px;font-weight:800;color:var(--accent-l);font-family:'DM Serif Display',serif;}
.signal-cat{font-size:11px;color:var(--muted);}

.signal-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px;}
@media(max-width:700px){.signal-metrics{grid-template-columns:repeat(3,1fr);}}
.metric{text-align:center;padding:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;}
.metric-val{font-size:18px;font-weight:700;color:#fff;font-family:'DM Serif Display',serif;}
.metric-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.metric-val.green{color:var(--green);}
.metric-val.red{color:var(--red);}
.metric-val.amber{color:var(--accent-l);}

.signal-reason{font-size:12px;color:var(--accent-l);padding:8px 12px;background:rgba(245,158,11,.06);border-radius:8px;margin-bottom:10px;}

.signal-actions{display:flex;gap:8px;flex-wrap:wrap;}
.sig-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s;border:none;}
.sig-btn-primary{background:var(--accent);color:#fff;}
.sig-btn-primary:hover{background:var(--accent-l);}
.sig-btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--muted);}
.sig-btn-ghost:hover{border-color:var(--accent);color:var(--accent-l);}
.sig-btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;}

/* Bulk */
.bulk-bar{display:none;align-items:center;gap:12px;padding:10px 16px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;margin-bottom:12px;}
.bulk-bar.show{display:flex;}
.bulk-bar span{color:#FCA5A5;font-size:13px;font-weight:600;}
.bulk-bar button{padding:7px 16px;border-radius:8px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.15);color:#FCA5A5;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.sig-check{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state h3{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;margin-bottom:8px;}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:7px 16px;border-radius:100px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.filter-btn.active{background:rgba(245,158,11,.15);border-color:var(--accent);color:var(--accent-l);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.signal-card{animation:fadeUp .3s ease both;}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-overlay"></div>

<div class="outer" id="mainApp" style="display:none;">
  <div class="user-bar">
    <div class="user-badge"><span id="userEmail"></span></div>
    <button class="logout-btn" onclick="doLogout()">Cerrar sesion</button>
  </div>

  <div class="nav-tabs">
    <a href="portal.html" class="nav-tab">Pre-Auth</a>
    <a href="hcc.html" class="nav-tab">HCC / RAF</a>
    <a href="govradar.html" class="nav-tab">GovRadar</a>
    <a href="arbitrage.html" class="nav-tab active">ArbitrageRadar</a>
  </div>

  <div class="header">
    <div class="logo-mark">
      <div class="logo-icon">$</div>
      <div class="logo-text">Arbitrage<span>Radar</span></div>
    </div>
    <h1>Market Intelligence</h1>
    <p>Demand + Supply + Competition = Opportunity</p>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('HOT',this)">HOT</button>
    <button class="filter-btn" onclick="setFilter('WARM',this)">WARM</button>
    <button class="filter-btn" onclick="setFilter('WATCH',this)">WATCH</button>
    <button class="filter-btn" onclick="setFilter('COLLECTING',this)">Collecting</button>
  </div>

  <div class="bulk-bar" id="bulkBar">
    <span id="bulkCount">0</span>
    <button onclick="deleteSelected()">Borrar</button>
    <button onclick="selectAll()" style="border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#94A3B8;">Seleccionar todas</button>
    <button onclick="deselectAll()" style="border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:#94A3B8;">Deseleccionar</button>
  </div>

  <div class="signal-list" id="signalList">
    <div class="empty-state"><h3>Cargando...</h3></div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBKmZkxsdP1p0uxKvmSJBYlQPiRPC0eXJ4",
    authDomain: "vindica-production.firebaseapp.com",
    projectId: "vindica-production",
    storageBucket: "vindica-production.firebasestorage.app",
    messagingSenderId: "82635207094",
    appId: "1:82635207094:web:59efd62fe671b764695117"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  auth.onAuthStateChanged(user => {
    if (!user) { window.location.href = 'index.html'; return; }
    document.getElementById('mainApp').style.display = '';
    document.getElementById('userEmail').textContent = user.email;
    loadSignals();
  });

  function doLogout() { auth.signOut().then(() => window.location.href = 'index.html'); }

  let allSignals = [];
  let currentFilter = 'all';

  function loadSignals() {
    db.collection('market_signals').orderBy('score', 'desc')
      .onSnapshot(snap => {
        allSignals = [];
        snap.forEach(doc => allSignals.push({ id: doc.id, ...doc.data() }));
        renderList();
      }, err => {
        document.getElementById('signalList').innerHTML = '<div class="empty-state"><h3>Error</h3><p>' + err.message + '</p></div>';
      });
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  function renderList() {
    let filtered = allSignals;
    if (currentFilter !== 'all') filtered = filtered.filter(s => s.signal === currentFilter);

    const container = document.getElementById('signalList');
    if (!filtered.length) {
      container.innerHTML = '<div class="empty-state"><h3>No hay signals</h3><p>El scanner corre cada 2 horas. Los datos se acumulan con cada scan.</p></div>';
      return;
    }

    container.innerHTML = filtered.map((s, i) => {
      const stColor = s.sellThrough >= 40 ? 'green' : s.sellThrough >= 20 ? 'amber' : '';
      const scColor = s.sellerCount <= 3 ? 'green' : s.sellerCount <= 8 ? 'amber' : '';
      const pcColor = s.priceChange > 5 ? 'red' : s.priceChange > 0 ? 'amber' : '';

      return `
      <div class="signal-card signal-${s.signal}" style="animation-delay:${i*40}ms">
        <div class="signal-top">
          <input type="checkbox" class="sig-check" onclick="toggleSelect('${s.id}',this.checked)" />
          <span class="signal-badge badge-${s.signal}">${s.signal}</span>
          <span class="signal-keyword">${esc(s.keyword)}</span>
          <span class="signal-cat">${esc(s.categoryName || '')}</span>
          <span class="signal-score">${s.score}</span>
        </div>
        <div class="signal-metrics">
          <div class="metric"><div class="metric-val">${s.activeCount || '-'}</div><div class="metric-label">Listings</div></div>
          <div class="metric"><div class="metric-val ${scColor}">${s.sellerCount || '-'}</div><div class="metric-label">Sellers</div></div>
          <div class="metric"><div class="metric-val ${stColor}">${s.sellThrough != null ? s.sellThrough + '%' : '...'}</div><div class="metric-label">Sell-Through</div></div>
          <div class="metric"><div class="metric-val">$${fmt(s.medianPrice)}</div><div class="metric-label">Median</div></div>
          <div class="metric"><div class="metric-val ${pcColor}">${s.priceChange ? (s.priceChange > 0 ? '+' : '') + s.priceChange + '%' : '...'}</div><div class="metric-label">Price Trend</div></div>
        </div>
        ${s.reason && s.signal !== 'COLLECTING' ? `<div class="signal-reason">${esc(s.reason)}</div>` : ''}
        <div class="signal-actions">
          <a class="sig-btn sig-btn-primary" href="${s.ebayUrl || '#'}" target="_blank">Ver en eBay</a>
          <button class="sig-btn sig-btn-danger" onclick="deleteSignal('${s.id}')">Borrar</button>
        </div>
      </div>`;
    }).join('');
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function fmt(n) { return n != null ? Number(n).toLocaleString('en-US', {maximumFractionDigits:0}) : '-'; }

  function deleteSignal(id) { db.collection('market_signals').doc(id).delete(); }

  // Bulk
  const selectedIds = new Set();
  function toggleSelect(id, checked) { if (checked) selectedIds.add(id); else selectedIds.delete(id); updateBulk(); }
  function updateBulk() {
    const bar = document.getElementById('bulkBar');
    document.getElementById('bulkCount').textContent = selectedIds.size + ' seleccionadas';
    bar.classList.toggle('show', selectedIds.size > 0);
  }
  function selectAll() {
    const filtered = currentFilter === 'all' ? allSignals : allSignals.filter(s => s.signal === currentFilter);
    filtered.forEach(s => selectedIds.add(s.id));
    document.querySelectorAll('.sig-check').forEach(cb => cb.checked = true);
    updateBulk();
  }
  function deselectAll() { selectedIds.clear(); document.querySelectorAll('.sig-check').forEach(cb => cb.checked = false); updateBulk(); }
  function deleteSelected() {
    if (!selectedIds.size || !confirm('Borrar ' + selectedIds.size + ' signals?')) return;
    const batch = db.batch();
    selectedIds.forEach(id => batch.delete(db.collection('market_signals').doc(id)));
    batch.commit().then(() => { selectedIds.clear(); updateBulk(); });
  }
</script>
</body>
</html>
