<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DomainRadar — Expired Domain Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#F59E0B;--accent-l:#FBBF24;--accent-d:#92400E;
  --accent-bg:#FFFBEB;--accent-bd:#FDE68A;
  --dark:#0F172A;--mid:#1E293B;--slate:#475569;
  --muted:#94A3B8;--light:#F8FAFC;--white:#FFFFFF;
  --border:#E2E8F0;
  --red:#EF4444;--red-bg:#FEF2F2;
  --green:#10B981;--green-bg:#ECFDF5;
  --blue:#3B82F6;--blue-bg:#EFF6FF;
  --purple:#8B5CF6;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--dark);min-height:100vh;}
.bg-layer{position:fixed;inset:0;background:
  radial-gradient(ellipse 70% 60% at 5% 15%,rgba(245,158,11,.14) 0%,transparent 55%),
  radial-gradient(ellipse 50% 70% at 95% 85%,rgba(245,158,11,.07) 0%,transparent 55%),
  linear-gradient(160deg,#0F172A 0%,#1E293B 50%,#0F172A 100%);z-index:0;}
.grid-overlay{position:fixed;inset:0;background-image:
  linear-gradient(rgba(245,158,11,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(245,158,11,.03) 1px,transparent 1px);
  background-size:40px 40px;z-index:0;}
.outer{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 20px 80px;}
.user-bar{display:flex;align-items:center;justify-content:flex-end;gap:12px;margin-bottom:12px;}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:100px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fff;font-size:12px;}
.user-badge span{color:var(--accent-l);font-weight:600;}
.logout-btn{padding:6px 14px;border-radius:100px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#FCA5A5;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.nav-tabs{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.nav-tab{padding:8px 20px;border-radius:100px;font-size:12px;font-weight:600;text-decoration:none;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:var(--muted);transition:all .2s;}
.nav-tab:hover{border-color:rgba(255,255,255,.3);color:#fff;}
.nav-tab.active{background:var(--accent);color:white;border-color:var(--accent);}
.header{text-align:center;margin-bottom:24px;}
.logo-mark{display:inline-flex;align-items:center;gap:12px;margin-bottom:14px;}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent-d),var(--accent));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 28px rgba(245,158,11,.45);}
.logo-text{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;}
.logo-text span{color:var(--accent-l);}
.header h1{font-family:'DM Serif Display',serif;font-size:24px;color:#fff;margin-bottom:6px;}
.header p{color:#94A3B8;font-size:13px;}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(3,1fr);}}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(245,158,11,.12);border-radius:12px;padding:16px;text-align:center;}
.stat-num{font-family:'DM Serif Display',serif;font-size:28px;color:#fff;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}

/* Domain cards */
.domain-list{display:flex;flex-direction:column;gap:10px;}
.domain-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px 20px;transition:all .2s;}
.domain-card:hover{border-color:rgba(245,158,11,.3);}
.domain-card.grade-A\+{border-left:4px solid var(--purple);}
.domain-card.grade-A{border-left:4px solid var(--green);}
.domain-card.grade-B{border-left:4px solid var(--accent);}
.domain-card.grade-C{border-left:4px solid var(--blue);}
.domain-card.grade-F{border-left:4px solid var(--red);}

.domain-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.grade-badge{font-size:14px;font-weight:800;padding:4px 12px;border-radius:6px;letter-spacing:.5px;font-family:'DM Serif Display',serif;}
.grade-Aplus{background:rgba(139,92,246,.15);color:#C4B5FD;}
.grade-A{background:rgba(16,185,129,.15);color:#6EE7B7;}
.grade-B{background:rgba(245,158,11,.15);color:var(--accent-l);}
.grade-C{background:rgba(59,130,246,.15);color:#60A5FA;}
.domain-name{flex:1;font-size:16px;font-weight:700;color:#fff;font-family:'DM Sans',sans-serif;}
.domain-score{font-size:22px;font-weight:800;color:var(--accent-l);font-family:'DM Serif Display',serif;}

.domain-metrics{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px;}
@media(max-width:700px){.domain-metrics{grid-template-columns:repeat(3,1fr);}}
.metric{text-align:center;padding:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;}
.metric-val{font-size:16px;font-weight:700;color:#fff;font-family:'DM Serif Display',serif;}
.metric-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.metric-val.green{color:var(--green);}
.metric-val.amber{color:var(--accent-l);}

.domain-valuation{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.val-box{flex:1;min-width:120px;padding:12px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:8px;text-align:center;}
.val-box .val-num{font-size:18px;font-weight:700;color:var(--accent-l);font-family:'DM Serif Display',serif;}
.val-box .val-label{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px;}

.domain-tags{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.tag{font-size:11px;padding:4px 10px;border-radius:100px;font-weight:600;}
.tag-kw{background:rgba(16,185,129,.12);color:#6EE7B7;border:1px solid rgba(16,185,129,.25);}
.tag-loc{background:rgba(59,130,246,.12);color:#60A5FA;border:1px solid rgba(59,130,246,.25);}
.tag-buyer{background:rgba(139,92,246,.12);color:#C4B5FD;border:1px solid rgba(139,92,246,.25);}
.tag-industry{background:rgba(245,158,11,.12);color:var(--accent-l);border:1px solid rgba(245,158,11,.25);}

.domain-recommendation{font-size:13px;font-weight:700;color:var(--accent-l);padding:8px 12px;background:rgba(245,158,11,.06);border-radius:8px;margin-bottom:10px;text-align:center;}

.domain-actions{display:flex;gap:8px;flex-wrap:wrap;}
.d-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s;border:none;}
.d-btn-primary{background:var(--accent);color:#fff;}
.d-btn-primary:hover{background:var(--accent-l);}
.d-btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--muted);}
.d-btn-ghost:hover{border-color:var(--accent);color:var(--accent-l);}
.d-btn-success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#6EE7B7;}
.d-btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:7px 16px;border-radius:100px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.filter-btn.active{background:rgba(245,158,11,.15);border-color:var(--accent);color:var(--accent-l);}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state h3{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;margin-bottom:8px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.domain-card{animation:fadeUp .3s ease both;}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-overlay"></div>

<div class="outer" id="mainApp" style="display:none;">
  <div class="user-bar">
    <div class="user-badge"><span id="userEmail"></span></div>
    <button class="logout-btn" onclick="doLogout()">Cerrar sesion</button>
  </div>

  <div class="nav-tabs">
    <a href="portal.html" class="nav-tab">Pre-Auth</a>
    <a href="hcc.html" class="nav-tab">HCC / RAF</a>
    <a href="govradar.html" class="nav-tab">GovRadar</a>
    <a href="arbitrage.html" class="nav-tab active">DomainRadar</a>
    <a href="options.html" class="nav-tab">Options GEX</a>
  </div>

  <div class="header">
    <div class="logo-mark">
      <div class="logo-icon">@</div>
      <div class="logo-text">Domain<span>Radar</span></div>
    </div>
    <h1>Expired Domain Scanner</h1>
    <p>Score 0-100 | Spam filter | ROI 10x minimum</p>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Detectados</div></div>
    <div class="stat-card"><div class="stat-num" id="statPurchased">0</div><div class="stat-label">Comprados</div></div>
    <div class="stat-card"><div class="stat-num" id="statListed">0</div><div class="stat-label">En venta</div></div>
    <div class="stat-card"><div class="stat-num" id="statSold">0</div><div class="stat-label">Vendidos</div></div>
    <div class="stat-card"><div class="stat-num" id="statProfit">$0</div><div class="stat-label">Profit</div></div>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('DETECTED',this)">Detectados</button>
    <button class="filter-btn" onclick="setFilter('PURCHASED',this)">Comprados</button>
    <button class="filter-btn" onclick="setFilter('LISTED',this)">En venta</button>
    <button class="filter-btn" onclick="setFilter('SOLD',this)">Vendidos</button>
    <button class="filter-btn" onclick="setFilter('IGNORED',this)">Ignorados</button>
    <button class="filter-btn" onclick="runScan(this)" style="margin-left:auto;background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.3);color:#6EE7B7;">Scan Ahora</button>
  </div>

  <div class="domain-list" id="domainList">
    <div class="empty-state"><h3>Cargando...</h3></div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBKmZkxsdP1p0uxKvmSJBYlQPiRPC0eXJ4",
    authDomain: "vindica-production.firebaseapp.com",
    projectId: "vindica-production",
    storageBucket: "vindica-production.firebasestorage.app",
    messagingSenderId: "82635207094",
    appId: "1:82635207094:web:59efd62fe671b764695117"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  auth.onAuthStateChanged(user => {
    if (!user) { window.location.href = 'index.html'; return; }
    document.getElementById('mainApp').style.display = '';
    document.getElementById('userEmail').textContent = user.email;
    loadDomains();
  });

  function doLogout() { auth.signOut().then(() => window.location.href = 'index.html'); }

  let allDomains = [];
  let currentFilter = 'all';

  function loadDomains() {
    db.collection('domains').orderBy('detectedAt', 'desc').limit(200)
      .onSnapshot(snap => {
        allDomains = [];
        snap.forEach(doc => allDomains.push({ id: doc.id, ...doc.data() }));
        updateStats();
        renderList();
      }, err => {
        document.getElementById('domainList').innerHTML = '<div class="empty-state"><h3>Error</h3><p>' + err.message + '</p></div>';
      });
  }

  function updateStats() {
    const purchased = allDomains.filter(d => ['PURCHASED','LISTED'].includes(d.status));
    const listed = allDomains.filter(d => d.status === 'LISTED');
    const sold = allDomains.filter(d => d.status === 'SOLD');
    const profit = sold.reduce((s, d) => s + (d.netProfit || 0), 0);

    document.getElementById('statTotal').textContent = allDomains.length;
    document.getElementById('statPurchased').textContent = purchased.length;
    document.getElementById('statListed').textContent = listed.length;
    document.getElementById('statSold').textContent = sold.length;
    document.getElementById('statProfit').textContent = '$' + Math.round(profit).toLocaleString();
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  function renderList() {
    let filtered = allDomains;
    if (currentFilter !== 'all') filtered = filtered.filter(d => d.status === currentFilter);

    const container = document.getElementById('domainList');
    if (!filtered.length) {
      container.innerHTML = '<div class="empty-state"><h3>No hay dominios</h3><p>El scanner corre cada 6 horas. Score min: 60, ROI min: 10x.</p></div>';
      return;
    }

    container.innerHTML = filtered.map((d, i) => {
      const gc = d.grade === 'A+' ? 'Aplus' : d.grade;
      const tags = [];
      if (d.hasHighValueKeyword) tags.push('<span class="tag tag-kw">' + esc(d.domain.replace(/\.(com|net|org)$/,'')) + '</span>');
      if (d.hasLocationKeyword) tags.push('<span class="tag tag-loc">Location Match</span>');
      if (d.hasObviousBuyer) tags.push('<span class="tag tag-buyer">Obvious Buyer</span>');
      if (d.industry && d.industry !== 'unknown') tags.push('<span class="tag tag-industry">' + esc(d.industry) + '</span>');

      const buyers = (d.buyerTypes || []).map(b => '<span class="tag tag-buyer">' + esc(b) + '</span>').join('');

      const breakdown = d.scoreBreakdown || {};

      return `
      <div class="domain-card grade-${d.grade === 'A+' ? 'A\\+' : d.grade}" style="animation-delay:${i*40}ms">
        <div class="domain-top">
          <span class="grade-badge grade-${gc}">${d.grade}</span>
          <span class="domain-name">${esc(d.domain)}</span>
          <span class="domain-score">${d.score}</span>
        </div>
        <div class="domain-metrics">
          <div class="metric"><div class="metric-val">${d.da || 0}</div><div class="metric-label">DA</div></div>
          <div class="metric"><div class="metric-val">${d.majesticTF || 0}</div><div class="metric-label">TF</div></div>
          <div class="metric"><div class="metric-val">${d.majesticCF || 0}</div><div class="metric-label">CF</div></div>
          <div class="metric"><div class="metric-val">${d.referringDomains || 0}</div><div class="metric-label">Ref Domains</div></div>
          <div class="metric"><div class="metric-val">${d.backlinks || 0}</div><div class="metric-label">Backlinks</div></div>
          <div class="metric"><div class="metric-val green">${d.roi || 0}x</div><div class="metric-label">ROI</div></div>
        </div>
        <div class="domain-valuation">
          <div class="val-box"><div class="val-num">$${d.auctionPrice || 12}</div><div class="val-label">Precio</div></div>
          <div class="val-box"><div class="val-num">$${fmt(d.lowEstimate)}</div><div class="val-label">Conservador</div></div>
          <div class="val-box"><div class="val-num">$${fmt(d.highEstimate)}</div><div class="val-label">Optimista</div></div>
          <div class="val-box"><div class="val-num">$${fmt(d.maxBidForROI10x)}</div><div class="val-label">Max Bid</div></div>
        </div>
        <div class="domain-tags">${tags.join('')}${buyers}</div>
        <div class="domain-recommendation">${esc(d.recommendation || '')}</div>
        <div class="domain-actions">
          <a class="d-btn d-btn-primary" href="https://web.archive.org/web/*/${d.domain}" target="_blank">Wayback</a>
          <a class="d-btn d-btn-ghost" href="https://ahrefs.com/backlink-checker/?input=${d.domain}" target="_blank">Ahrefs</a>
          <a class="d-btn d-btn-ghost" href="https://freetools.seobility.net/en/backlink-checker?url=${d.domain}" target="_blank">SEOBility</a>
          <a class="d-btn d-btn-ghost" href="https://www.google.com/search?q=site:${d.domain}" target="_blank">Google</a>
          ${d.status === 'DETECTED' ? `<button class="d-btn d-btn-success" onclick="markPurchased('${d.id}')">Compre</button>` : ''}
          ${d.status === 'PURCHASED' ? `<button class="d-btn d-btn-success" onclick="markListed('${d.id}')">En venta</button>` : ''}
          ${d.status === 'DETECTED' ? `<button class="d-btn d-btn-danger" onclick="markIgnored('${d.id}')">Ignorar</button>` : ''}
          <button class="d-btn d-btn-danger" onclick="deleteDomain('${d.id}')">Eliminar</button>
        </div>
      </div>`;
    }).join('');
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function fmt(n) { return n != null ? Number(n).toLocaleString('en-US', {maximumFractionDigits:0}) : '0'; }

  function markPurchased(id) {
    const price = prompt('Precio de compra ($):');
    if (!price) return;
    db.collection('domains').doc(id).update({ status: 'PURCHASED', purchasePrice: parseFloat(price), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  }
  function markListed(id) {
    const price = prompt('Precio de lista ($):');
    if (!price) return;
    db.collection('domains').doc(id).update({ status: 'LISTED', listedPrice: parseFloat(price), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  }
  function markIgnored(id) {
    db.collection('domains').doc(id).update({ status: 'IGNORED', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  }
  function deleteDomain(id) {
    if (!confirm('Eliminar este dominio?')) return;
    db.collection('domains').doc(id).delete();
  }
  function runScan(btn) {
    btn.textContent = 'Escaneando...';
    btn.disabled = true;
    fetch('https://arbitrage-radar-82635207094.us-east1.run.app/scan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' })
      .then(() => { btn.textContent = 'Scan iniciado'; setTimeout(() => { btn.textContent = 'Scan Ahora'; btn.disabled = false; }, 5000); })
      .catch(() => { btn.textContent = 'Error'; setTimeout(() => { btn.textContent = 'Scan Ahora'; btn.disabled = false; }, 3000); });
  }
</script>
</body>
</html>
