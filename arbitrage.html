<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArbitrageRadar — Equipment Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#F59E0B;--accent-l:#FBBF24;--accent-d:#92400E;
  --accent-bg:#FFFBEB;--accent-bd:#FDE68A;
  --dark:#0F172A;--mid:#1E293B;--slate:#475569;
  --muted:#94A3B8;--light:#F8FAFC;--white:#FFFFFF;
  --border:#E2E8F0;
  --teal:#0D9488;--teal-l:#14B8A6;
  --red:#EF4444;--red-bg:#FEF2F2;
  --green:#10B981;--green-bg:#ECFDF5;
  --blue:#3B82F6;--blue-bg:#EFF6FF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--dark);min-height:100vh;}
.bg-layer{position:fixed;inset:0;background:
  radial-gradient(ellipse 70% 60% at 5% 15%,rgba(245,158,11,.14) 0%,transparent 55%),
  radial-gradient(ellipse 50% 70% at 95% 85%,rgba(245,158,11,.07) 0%,transparent 55%),
  linear-gradient(160deg,#0F172A 0%,#1E293B 50%,#0F172A 100%);z-index:0;}
.grid-overlay{position:fixed;inset:0;background-image:
  linear-gradient(rgba(245,158,11,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(245,158,11,.03) 1px,transparent 1px);
  background-size:40px 40px;z-index:0;}
.outer{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 20px 80px;}
.user-bar{display:flex;align-items:center;justify-content:flex-end;gap:12px;margin-bottom:12px;}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:100px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#fff;font-size:12px;}
.user-badge span{color:var(--accent-l);font-weight:600;}
.logout-btn{padding:6px 14px;border-radius:100px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#FCA5A5;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.nav-tabs{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.nav-tab{padding:8px 20px;border-radius:100px;font-size:12px;font-weight:600;text-decoration:none;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:var(--muted);transition:all .2s;}
.nav-tab:hover{border-color:rgba(255,255,255,.3);color:#fff;}
.nav-tab.active{background:var(--accent);color:white;border-color:var(--accent);}
.header{text-align:center;margin-bottom:24px;}
.logo-mark{display:inline-flex;align-items:center;gap:12px;margin-bottom:14px;}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent-d),var(--accent));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 28px rgba(245,158,11,.45);}
.logo-text{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;}
.logo-text span{color:var(--accent-l);}
.header h1{font-family:'DM Serif Display',serif;font-size:24px;color:#fff;margin-bottom:6px;}
.header p{color:#94A3B8;font-size:13px;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:700px){.stats-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(245,158,11,.12);border-radius:12px;padding:16px;text-align:center;}
.stat-num{font-family:'DM Serif Display',serif;font-size:28px;color:#fff;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:7px 16px;border-radius:100px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.filter-btn.active{background:rgba(245,158,11,.15);border-color:var(--accent);color:var(--accent-l);}
.filter-btn:hover{border-color:var(--accent);color:var(--accent-l);}

/* Cards */
.opp-list{display:flex;flex-direction:column;gap:10px;}
.opp-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;transition:all .2s;}
.opp-card:hover{border-color:rgba(245,158,11,.3);}
.opp-card.urgent-CRITICAL{border-left:3px solid var(--red);}
.opp-card.urgent-HIGH{border-left:3px solid var(--accent);}
.opp-card.urgent-MEDIUM{border-left:3px solid var(--green);}
.opp-head{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;}
.opp-head:hover{background:rgba(255,255,255,.02);}
.opp-source{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;}
.opp-source.govplanet{background:rgba(16,185,129,.15);color:#34D399;}
.opp-source.ironplanet{background:rgba(59,130,246,.15);color:#60A5FA;}
.opp-source.hibid{background:rgba(168,85,247,.15);color:#C084FC;}
.opp-source.ebay{background:rgba(245,158,11,.15);color:var(--accent-l);}
.opp-title{flex:1;font-size:13px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.opp-profit{font-size:14px;font-weight:700;color:var(--green);white-space:nowrap;}
.opp-margin{font-size:11px;color:var(--accent-l);white-space:nowrap;min-width:50px;text-align:right;}
.opp-time{font-size:11px;color:var(--muted);white-space:nowrap;}
.opp-badges{display:flex;gap:4px;}
.badge-sm{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;}
.badge-local{background:rgba(59,130,246,.15);color:#60A5FA;}
.badge-cert{background:rgba(16,185,129,.15);color:#34D399;}

/* Expanded */
.opp-body{display:none;padding:0 18px 18px;border-top:1px solid rgba(255,255,255,.06);}
.opp-card.open .opp-body{display:block;}
.opp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
@media(max-width:600px){.opp-grid{grid-template-columns:1fr;}}
.opp-section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 14px;}
.opp-section h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent-l);margin-bottom:8px;}
.opp-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:#CBD5E1;}
.opp-row .val{color:#fff;font-weight:600;}
.opp-row .val.green{color:var(--green);}
.opp-row .val.red{color:var(--red);}
.opp-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.opp-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s;border:none;}
.opp-btn-primary{background:var(--accent);color:#fff;}
.opp-btn-primary:hover{background:var(--accent-l);}
.opp-btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--muted);}
.opp-btn-ghost:hover{border-color:var(--accent);color:var(--accent-l);}
.opp-btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;}

.status-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:100px;letter-spacing:.5px;}
.status-DETECTED{background:rgba(245,158,11,.15);color:var(--accent-l);}
.status-MONITORING{background:rgba(59,130,246,.15);color:#60A5FA;}
.status-BID_PLACED{background:rgba(168,85,247,.15);color:#C084FC;}
.status-WON{background:rgba(16,185,129,.15);color:#34D399;}
.status-SOLD{background:rgba(16,185,129,.25);color:#34D399;}
.status-IGNORED{background:rgba(255,255,255,.05);color:var(--muted);}
.status-LOST{background:rgba(239,68,68,.15);color:#FCA5A5;}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state h3{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;margin-bottom:8px;}

/* Checkbox */
.opp-check{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
/* Bulk action bar */
.bulk-bar{display:none;align-items:center;gap:12px;padding:10px 16px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;margin-bottom:12px;}
.bulk-bar.show{display:flex;}
.bulk-bar span{color:#FCA5A5;font-size:13px;font-weight:600;}
.bulk-bar button{padding:7px 16px;border-radius:8px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.15);color:#FCA5A5;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.bulk-bar button:hover{background:rgba(239,68,68,.3);}
.bulk-bar .sel-all{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:var(--muted);}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.opp-card{animation:fadeUp .3s ease both;}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-overlay"></div>

<div class="outer" id="mainApp" style="display:none;">
  <div class="user-bar">
    <div class="user-badge"><span id="userEmail"></span></div>
    <button class="logout-btn" onclick="doLogout()">Cerrar sesion</button>
  </div>

  <!-- Nav -->
  <div class="nav-tabs">
    <a href="portal.html" class="nav-tab">Pre-Auth</a>
    <a href="hcc.html" class="nav-tab">HCC / RAF</a>
    <a href="govradar.html" class="nav-tab">GovRadar</a>
    <a href="arbitrage.html" class="nav-tab active">ArbitrageRadar</a>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="logo-mark">
      <div class="logo-icon">$</div>
      <div class="logo-text">Arbitrage<span>Radar</span></div>
    </div>
    <h1>Equipment Arbitrage Scanner</h1>
    <p>Auctions vs eBay Sold — Margen > 40%</p>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">Detectadas</div></div>
    <div class="stat-card"><div class="stat-num" id="statActive">-</div><div class="stat-label">Activas</div></div>
    <div class="stat-card"><div class="stat-num" id="statWon">-</div><div class="stat-label">Ganadas</div></div>
    <div class="stat-card"><div class="stat-num" id="statProfit">-</div><div class="stat-label">Profit Total</div></div>
    <div class="stat-card"><div class="stat-num" id="statROI">-</div><div class="stat-label">ROI Avg</div></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all')">Todas</button>
    <button class="filter-btn" onclick="setFilter('DETECTED')">Nuevas</button>
    <button class="filter-btn" onclick="setFilter('BID_PLACED')">Bid</button>
    <button class="filter-btn" onclick="setFilter('WON')">Won</button>
    <button class="filter-btn" onclick="setFilter('SOLD')">Sold</button>
    <button class="filter-btn" onclick="setFilter('govplanet')">GovPlanet</button>
    <button class="filter-btn" onclick="setFilter('ironplanet')">IronPlanet</button>
    <button class="filter-btn" onclick="setFilter('hibid')">HiBid</button>
  </div>

  <!-- Bulk action bar -->
  <div class="bulk-bar" id="bulkBar">
    <span id="bulkCount">0 seleccionadas</span>
    <button onclick="deleteSelected()">Borrar seleccionadas</button>
    <button onclick="ignoreSelected()">Ignorar seleccionadas</button>
    <button class="sel-all" onclick="selectAll()">Seleccionar todas</button>
    <button class="sel-all" onclick="deselectAll()">Deseleccionar</button>
  </div>

  <!-- Opportunity list -->
  <div class="opp-list" id="oppList">
    <div class="empty-state"><h3>Cargando...</h3></div>
  </div>
</div>

<script>
  // ===== Firebase =====
  const firebaseConfig = {
    apiKey:            "AIzaSyBKmZkxsdP1p0uxKvmSJBYlQPiRPC0eXJ4",
    authDomain:        "vindica-production.firebaseapp.com",
    projectId:         "vindica-production",
    storageBucket:     "vindica-production.firebasestorage.app",
    messagingSenderId: "82635207094",
    appId:             "1:82635207094:web:59efd62fe671b764695117"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  auth.onAuthStateChanged(user => {
    if (!user) { window.location.href = 'index.html'; return; }
    document.getElementById('mainApp').style.display = '';
    document.getElementById('userEmail').textContent = user.email;
    loadOpportunities();
  });

  function doLogout() { auth.signOut().then(() => window.location.href = 'index.html'); }

  // ===== State =====
  let allOpps = [];
  let currentFilter = 'all';

  // ===== Load from Firestore =====
  function loadOpportunities() {
    db.collection('opportunities').orderBy('detectedAt', 'desc').limit(100)
      .onSnapshot(snap => {
        allOpps = [];
        snap.forEach(doc => allOpps.push({ id: doc.id, ...doc.data() }));
        updateStats();
        renderList();
      }, err => {
        console.error('Firestore error:', err);
        document.getElementById('oppList').innerHTML = '<div class="empty-state"><h3>Error cargando datos</h3><p>' + err.message + '</p></div>';
      });
  }

  // ===== Stats =====
  function updateStats() {
    const active = allOpps.filter(o => ['DETECTED','MONITORING','BID_PLACED'].includes(o.status));
    const won    = allOpps.filter(o => o.status === 'WON' || o.status === 'SOLD');
    const sold   = allOpps.filter(o => o.status === 'SOLD');
    const profit = sold.reduce((s, o) => s + (o.actualNetProfit || 0), 0);
    const avgRoi = sold.length > 0
      ? sold.reduce((s, o) => s + ((o.actualNetProfit || 0) / (o.actualBuyPrice || o.estimatedBuyPrice || 1)) * 100, 0) / sold.length
      : 0;

    document.getElementById('statTotal').textContent  = allOpps.length;
    document.getElementById('statActive').textContent  = active.length;
    document.getElementById('statWon').textContent     = won.length;
    document.getElementById('statProfit').textContent   = '$' + Math.round(profit).toLocaleString();
    document.getElementById('statROI').textContent      = Math.round(avgRoi) + '%';
  }

  // ===== Filters =====
  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    renderList();
  }

  function applyFilter(list) {
    if (currentFilter === 'all') return list;
    // Status filter
    if (['DETECTED','MONITORING','BID_PLACED','WON','SOLD','IGNORED','LOST'].includes(currentFilter)) {
      return list.filter(o => o.status === currentFilter);
    }
    // Source filter
    return list.filter(o => o.source === currentFilter);
  }

  // ===== Render =====
  function renderList() {
    const filtered = applyFilter(allOpps);
    const container = document.getElementById('oppList');

    if (!filtered.length) {
      container.innerHTML = '<div class="empty-state"><h3>No hay oportunidades</h3><p>El scanner enviara alertas cuando detecte margenes > 40%</p></div>';
      return;
    }

    container.innerHTML = filtered.map((o, i) => {
      const hrs = o.hoursRemaining != null ? Math.round(o.hoursRemaining) + 'h' : '-';
      const badges = [];
      if (o.isLocal) badges.push('<span class="badge-sm badge-local">LOCAL</span>');
      if (o.isCertified) badges.push('<span class="badge-sm badge-cert">IRONCLAD</span>');

      return `
      <div class="opp-card urgent-${o.urgency || 'MEDIUM'}" style="animation-delay:${i*50}ms" id="opp-${o.id}">
        <div class="opp-head">
          <input type="checkbox" class="opp-check" onclick="event.stopPropagation();selectOpp('${o.id}',this.checked)" />
          <span class="opp-source ${o.source || ''}">${o.source || '?'}</span>
          <span class="opp-title" onclick="toggleCard('${o.id}')">${esc(o.itemTitle || '')}</span>
          <span class="opp-badges">${badges.join('')}</span>
          <span class="opp-profit">+$${Math.round(o.netProfit || 0).toLocaleString()}</span>
          <span class="opp-margin">${Math.round(o.marginPercent || 0)}%</span>
          <span class="status-badge status-${o.status}">${o.status}</span>
          <span class="opp-time">${hrs}</span>
        </div>
        <div class="opp-body">
          <div class="opp-grid">
            <div class="opp-section">
              <h4>Precio Subasta</h4>
              <div class="opp-row"><span>Precio actual</span><span class="val">$${fmt(o.currentPrice)}</span></div>
              ${o.buyNowPrice ? `<div class="opp-row"><span>Buy Now</span><span class="val">$${fmt(o.buyNowPrice)}</span></div>` : ''}
              <div class="opp-row"><span>Est. compra</span><span class="val">$${fmt(o.estimatedBuyPrice)}</span></div>
              <div class="opp-row"><span>Bid max recomendado</span><span class="val green">$${fmt(o.maxBid)}</span></div>
              <div class="opp-row"><span>Fuente</span><span class="val">${esc(o.source)}</span></div>
              <div class="opp-row"><span>Vendedor</span><span class="val">${esc(o.seller || '-')}</span></div>
              <div class="opp-row"><span>Ubicacion</span><span class="val">${esc(o.location || '-')}</span></div>
            </div>
            <div class="opp-section">
              <h4>eBay Sold Valuation</h4>
              <div class="opp-row"><span>Mediana (${o.marketValueSample || 0} ventas)</span><span class="val green">$${fmt(o.marketValueMedian)}</span></div>
              <div class="opp-row"><span>Promedio</span><span class="val">$${fmt(o.marketValueAvg)}</span></div>
              <div class="opp-row"><span>Min</span><span class="val">$${fmt(o.marketValueMin)}</span></div>
              <div class="opp-row"><span>Max</span><span class="val">$${fmt(o.marketValueMax)}</span></div>
              <div class="opp-row" style="margin-top:8px;border-top:1px solid rgba(255,255,255,.08);padding-top:8px;">
                <span>Ganancia neta</span><span class="val green">$${fmt(Math.round(o.netProfit || 0))}</span></div>
              <div class="opp-row"><span>Margen</span><span class="val green">${Math.round(o.marginPercent || 0)}%</span></div>
              <div class="opp-row"><span>ROI</span><span class="val green">${Math.round(o.roi || 0)}%</span></div>
            </div>
          </div>
          <div class="opp-actions">
            <a class="opp-btn opp-btn-primary" href="${o.itemUrl || '#'}" target="_blank">Ver subasta</a>
            <a class="opp-btn opp-btn-ghost" href="${o.ebayListingsUrl || '#'}" target="_blank">Ver eBay Sold</a>
            ${o.photos && o.photos[0] ? `<a class="opp-btn opp-btn-ghost" href="${o.photos[0]}" target="_blank">Fotos</a>` : ''}
            <a class="opp-btn opp-btn-ghost" href="https://www.uship.com/" target="_blank">Cotizar freight</a>
            ${o.status === 'DETECTED' ? `
              <button class="opp-btn opp-btn-ghost" onclick="updateOppStatus('${o.id}','MONITORING')">Monitoring</button>
              <button class="opp-btn opp-btn-ghost" onclick="updateOppStatus('${o.id}','BID_PLACED')">Bid Placed</button>
              <button class="opp-btn opp-btn-danger" onclick="updateOppStatus('${o.id}','IGNORED')">Ignorar</button>
            ` : ''}
            ${o.status === 'BID_PLACED' ? `
              <button class="opp-btn opp-btn-primary" onclick="promptWon('${o.id}')">Won!</button>
              <button class="opp-btn opp-btn-danger" onclick="updateOppStatus('${o.id}','LOST')">Lost</button>
            ` : ''}
            ${o.status === 'WON' ? `
              <button class="opp-btn opp-btn-primary" onclick="promptSold('${o.id}')">Sold!</button>
            ` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function toggleCard(id) {
    document.getElementById('opp-' + id)?.classList.toggle('open');
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function fmt(n) { return n != null ? Number(n).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}) : '-'; }

  // ===== Status updates =====
  function updateOppStatus(id, status) {
    db.collection('opportunities').doc(id).update({ status, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  }

  function promptWon(id) {
    const price = prompt('Precio de compra real ($):');
    if (!price) return;
    db.collection('opportunities').doc(id).update({
      status: 'WON',
      actualBuyPrice: parseFloat(price),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  function promptSold(id) {
    const price = prompt('Precio de venta real ($):');
    if (!price) return;
    const doc = allOpps.find(o => o.id === id);
    const buyPrice = doc?.actualBuyPrice || doc?.estimatedBuyPrice || 0;
    const fees = parseFloat(price) * 0.13;
    const actualNetProfit = parseFloat(price) - buyPrice - fees;
    db.collection('opportunities').doc(id).update({
      status: 'SOLD',
      actualSellPrice: parseFloat(price),
      actualNetProfit: Math.round(actualNetProfit),
      soldAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  // ===== Bulk select/delete =====
  const selectedIds = new Set();

  function selectOpp(id, checked) {
    if (checked) selectedIds.add(id); else selectedIds.delete(id);
    updateBulkBar();
  }

  function updateBulkBar() {
    const bar = document.getElementById('bulkBar');
    const count = document.getElementById('bulkCount');
    if (selectedIds.size > 0) {
      bar.classList.add('show');
      count.textContent = selectedIds.size + ' seleccionada' + (selectedIds.size > 1 ? 's' : '');
    } else {
      bar.classList.remove('show');
    }
  }

  function selectAll() {
    const filtered = applyFilter(allOpps);
    filtered.forEach(o => selectedIds.add(o.id));
    document.querySelectorAll('.opp-check').forEach(cb => cb.checked = true);
    updateBulkBar();
  }

  function deselectAll() {
    selectedIds.clear();
    document.querySelectorAll('.opp-check').forEach(cb => cb.checked = false);
    updateBulkBar();
  }

  function deleteSelected() {
    if (!selectedIds.size) return;
    if (!confirm('Borrar ' + selectedIds.size + ' oportunidades permanentemente?')) return;
    const batch = db.batch();
    selectedIds.forEach(id => batch.delete(db.collection('opportunities').doc(id)));
    batch.commit().then(() => { selectedIds.clear(); updateBulkBar(); });
  }

  function ignoreSelected() {
    if (!selectedIds.size) return;
    const batch = db.batch();
    selectedIds.forEach(id => batch.update(db.collection('opportunities').doc(id), { status: 'IGNORED', updatedAt: firebase.firestore.FieldValue.serverTimestamp() }));
    batch.commit().then(() => { selectedIds.clear(); updateBulkBar(); });
  }
</script>
</body>
</html>
