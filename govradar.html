<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GovRadar — Contratos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#CC0000;--teal-l:#EF4444;--teal-d:#991B1B;
  --teal-bg:#FEF2F2;--teal-bd:#FECACA;
  --dark:#0F172A;--mid:#1E293B;--slate:#475569;
  --muted:#94A3B8;--light:#F8FAFC;--white:#FFFFFF;
  --border:#E2E8F0;
  --amber:#F59E0B;--amber-bg:#FFFBEB;--amber-d:#92400E;
  --red:#EF4444;--red-bg:#FEF2F2;
  --green:#10B981;--green-bg:#ECFDF5;
  --blue:#3B82F6;--blue-bg:#EFF6FF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--dark);min-height:100vh;}
.bg-layer{position:fixed;inset:0;background:
  radial-gradient(ellipse 70% 60% at 5% 15%,rgba(204,0,0,.14) 0%,transparent 55%),
  radial-gradient(ellipse 50% 70% at 95% 85%,rgba(204,0,0,.07) 0%,transparent 55%),
  linear-gradient(160deg,#0F172A 0%,#1E293B 50%,#0F172A 100%);z-index:0;}
.grid-overlay{position:fixed;inset:0;background-image:
  linear-gradient(rgba(204,0,0,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(204,0,0,.03) 1px,transparent 1px);
  background-size:40px 40px;z-index:0;}
.outer{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 20px 80px;}
.user-bar{display:flex;align-items:center;justify-content:flex-end;gap:12px;margin-bottom:12px;}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:100px;background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.25);color:#fff;font-size:12px;}
.user-badge span{color:#EF4444;font-weight:600;}
.logout-btn{padding:6px 14px;border-radius:100px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#FCA5A5;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.nav-tabs{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px;}
.nav-tab{padding:8px 20px;border-radius:100px;font-size:12px;font-weight:600;text-decoration:none;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:var(--muted);}
.nav-tab.active{background:var(--teal);color:white;border-color:var(--teal);}
.header{text-align:center;margin-bottom:24px;}
.logo-mark{display:inline-flex;align-items:center;gap:12px;margin-bottom:14px;}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,#991B1B,#CC0000);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 28px rgba(204,0,0,.45);}
.logo-text{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;}
.logo-text span{color:#EF4444;}
.header h1{font-family:'DM Serif Display',serif;font-size:24px;color:#fff;margin-bottom:6px;}
.header p{color:#94A3B8;font-size:13px;}

/* Stats bar */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(204,0,0,.12);border-radius:12px;padding:16px;text-align:center;}
.stat-num{font-family:'DM Serif Display',serif;font-size:28px;color:#fff;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:7px 16px;border-radius:100px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.filter-btn.active{background:rgba(204,0,0,.15);border-color:var(--teal);color:var(--teal-l);}
.filter-btn:hover{border-color:var(--teal);color:var(--teal-l);}

/* Contract cards */
.contracts-list{display:flex;flex-direction:column;gap:12px;}
.contract-card{background:rgba(255,255,255,.97);border-radius:16px;overflow:hidden;box-shadow:0 4px 6px rgba(0,0,0,.25),0 12px 40px rgba(0,0,0,.3);transition:transform .2s;}
.contract-card:hover{transform:translateY(-2px);}
.cc-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;}
.cc-source{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.cc-source.federal{background:linear-gradient(135deg,#1E40AF,#3B82F6);}
.cc-source.ct-state{background:linear-gradient(135deg,#0F766E,#14B8A6);}
.cc-source.ct-muni{background:linear-gradient(135deg,#7C3AED,#A78BFA);}
.cc-title-area{flex:1;min-width:0;}
.cc-title{font-size:14px;font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-agency{font-size:11px;color:var(--slate);margin-top:2px;}
.cc-badges{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.3px;}
.badge-green{background:var(--green-bg);color:#065F46;border:1px solid #A7F3D0;}
.badge-amber{background:var(--amber-bg);color:var(--amber-d);border:1px solid #FDE68A;}
.badge-red{background:var(--red-bg);color:#991B1B;border:1px solid #FECACA;}
.badge-blue{background:var(--blue-bg);color:#1E40AF;border:1px solid #BFDBFE;}
.badge-gray{background:var(--light);color:var(--slate);border:1px solid var(--border);}

.cc-body{display:none;padding:20px;}
.cc-body.open{display:block;}
.cc-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.cc-grid{grid-template-columns:1fr;}}
.cc-section{background:var(--light);border:1.5px solid var(--border);border-radius:11px;padding:14px;}
.cc-section h4{font-size:12px;font-weight:700;color:var(--dark);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.cc-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--slate);}
.cc-row strong{color:var(--dark);}
.cc-warning{background:var(--amber-bg);border:1.5px solid #FDE68A;border-radius:8px;padding:10px 14px;margin-top:12px;font-size:11px;color:var(--amber-d);display:flex;align-items:flex-start;gap:8px;}
.cc-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:none;text-decoration:none;}
.btn-primary{background:linear-gradient(135deg,var(--teal-d),var(--teal));color:#fff;box-shadow:0 4px 14px rgba(204,0,0,.35);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(204,0,0,.45);}
.btn-ghost{background:transparent;color:var(--slate);border:1.5px solid var(--border);}
.btn-ghost:hover{background:var(--light);}
.btn-red{background:rgba(239,68,68,.08);border:1.5px solid rgba(239,68,68,.3);color:#EF4444;}
.btn-red:hover{background:rgba(239,68,68,.15);}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .icon{font-size:48px;margin-bottom:12px;}
.empty-state h3{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;margin-bottom:8px;}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--teal-bd);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="grid-overlay"></div>

<div class="outer" id="mainApp" style="display:none;">
  <div class="user-bar">
    <div class="user-badge"><span id="userEmail"></span></div>
    <button class="logout-btn" onclick="doLogout()">Cerrar sesion</button>
  </div>

  <div class="nav-tabs">
    <a href="portal.html" class="nav-tab">Pre-Auth</a>
    <a href="hcc.html" class="nav-tab">HCC / RAF</a>
    <a href="govradar.html" class="nav-tab active">GovRadar</a>
  </div>

  <div class="header">
    <div class="logo-mark">
      <div class="logo-icon"><svg width="26" height="26" viewBox="-54 -62 108 124" xmlns="http://www.w3.org/2000/svg"><polygon points="0,-44 38,-22 38,22 0,44 -38,22 -38,-22" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/><line x1="-30" y1="0" x2="30" y2="0" stroke="rgba(255,255,255,.3)" stroke-width="1"/><line x1="0" y1="-30" x2="0" y2="30" stroke="rgba(255,255,255,.3)" stroke-width="1"/><path d="M12,-18 A22,22 0 0,1 12,18" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><path d="M22,-28 A36,36 0 0,1 22,28" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity=".6"/><path d="M32,-38 A50,50 0 0,1 32,38" fill="none" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity=".3"/><circle cx="0" cy="0" r="5" fill="#fff"/><circle cx="0" cy="0" r="9" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1"/></svg></div>
      <div class="logo-text">Gov<span>Radar</span></div>
    </div>
    <h1>Contract Intelligence</h1>
    <p>Federal + CT Estado + Municipal — contratos activos con calculo de margen</p>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="statTotal">-</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num" id="statViable" style="color:var(--green);">-</div><div class="stat-label">Viables</div></div>
    <div class="stat-card"><div class="stat-num" id="statInterested" style="color:var(--teal-l);">-</div><div class="stat-label">Interesados</div></div>
    <div class="stat-card"><div class="stat-num" id="statAvgMargin" style="color:var(--amber);">-</div><div class="stat-label">Margen Prom.</div></div>
  </div>

  <!-- Add Contract Button + Modal -->
  <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
    <button class="btn btn-primary" onclick="toggleAddForm()">+ Agregar Contrato Manual</button>
  </div>

  <div id="addContractForm" style="display:none;margin-bottom:20px;">
    <div style="background:rgba(255,255,255,.97);border-radius:16px;padding:24px;box-shadow:0 4px 6px rgba(0,0,0,.25);">
      <h3 style="font-family:'DM Serif Display',serif;font-size:18px;color:var(--dark);margin-bottom:16px;">Agregar Contrato Manual</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label style="font-size:11px;font-weight:600;color:var(--dark);text-transform:uppercase;">Fuente *</label>
          <select id="addSource" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;">
            <option value="CT_STATE">CT Estado (BizNet)</option>
            <option value="CT_MUNICIPAL">Municipal</option>
            <option value="FEDERAL">Federal</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label style="font-size:11px;font-weight:600;color:var(--dark);text-transform:uppercase;">Municipio (si aplica)</label>
          <select id="addMunicipio" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;">
            <option value="">N/A</option>
            <option value="Hartford">Hartford</option>
            <option value="Bridgeport">Bridgeport</option>
            <option value="New Haven">New Haven</option>
            <option value="Stamford">Stamford</option>
            <option value="Waterbury">Waterbury</option>
            <option value="Meriden">Meriden</option>
            <option value="New Britain">New Britain</option>
            <option value="West Hartford">West Hartford</option>
          </select>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;grid-column:1/-1;">
          <label style="font-size:11px;font-weight:600;color:var(--dark);text-transform:uppercase;">Titulo / Producto *</label>
          <input type="text" id="addTitle" placeholder="Ej: Office Supplies - Paper, Toner, Folders" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;grid-column:1/-1;">
          <label style="font-size:11px;font-weight:600;color:var(--dark);text-transform:uppercase;">Descripcion</label>
          <textarea id="addDesc" rows="2" placeholder="Detalles adicionales del contrato..." style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;resize:vertical;"></textarea>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label style="font-size:11px;font-weight:600;color:var(--dark);text-transform:uppercase;">Agencia *</label>
          <input type="text" id="addAgency" placeholder="Ej: Department of Administrative Services" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label style="font-size:11px;font-weight:600;color:var(--dark);text-transform:uppercase;">Deadline *</label>
          <input type="date" id="addDeadline" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label style="font-size:11px;font-weight:600;color:var(--dark);text-transform:uppercase;">URL del contrato</label>
          <input type="url" id="addUrl" placeholder="https://biznet.ct.gov/..." style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;">
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;">
          <label style="font-size:11px;font-weight:600;color:var(--dark);text-transform:uppercase;">Valor estimado ($)</label>
          <input type="number" id="addValue" placeholder="5000" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="toggleAddForm()">Cancelar</button>
        <button class="btn btn-primary" id="btnSaveContract" onclick="saveManualContract()">Guardar Contrato</button>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all')">Todos</button>
    <button class="filter-btn" onclick="setFilter('alerted')">Alertados</button>
    <button class="filter-btn" onclick="setFilter('interested')">Interesados</button>
    <button class="filter-btn" onclick="setFilter('pending_alert')">Pendientes</button>
    <button class="filter-btn" onclick="setFilter('FEDERAL')">Federal</button>
    <button class="filter-btn" onclick="setFilter('CT_STATE')">CT Estado</button>
    <button class="filter-btn" onclick="setFilter('CT_MUNICIPAL')">Municipal</button>
  </div>

  <!-- Contract list -->
  <div class="contracts-list" id="contractsList">
    <div class="empty-state"><div class="spinner"></div><p style="margin-top:12px;">Cargando contratos...</p></div>
  </div>
</div>

<script>
const FIREBASE_CFG = {
  apiKey:"AIzaSyBKmZkxsdP1p0uxKvmSJBYlQPiRPC0eXJ4",
  authDomain:"vindica-production.firebaseapp.com",
  projectId:"vindica-production"
};

firebase.initializeApp(FIREBASE_CFG);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('mainApp').style.display = '';
    document.getElementById('userEmail').textContent = user.email;
    loadContracts();
  } else {
    window.location.href = 'index.html';
  }
});
function doLogout() { auth.signOut(); }

let allContracts = [];
let currentFilter = 'all';

async function loadContracts() {
  try {
    const snap = await db.collection('contracts')
      .where('status', 'in', ['alerted', 'interested', 'pending_alert', 'qualified'])
      .limit(100)
      .get();

    allContracts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Sort client-side to avoid composite index requirement
    allContracts.sort((a, b) => {
      const da = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt || 0);
      const db2 = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt || 0);
      return db2 - da;
    });
    updateStats();
    renderContracts();
  } catch (err) {
    document.getElementById('contractsList').innerHTML =
      '<div class="empty-state"><div class="icon">&#x26A0;&#xFE0F;</div><h3>Error cargando datos</h3><p>' + err.message + '</p></div>';
  }
}

function updateStats() {
  const viable = allContracts.filter(c => c.calculoData?.viable);
  const interested = allContracts.filter(c => c.status === 'interested');
  const margins = viable.map(c => c.calculoData?.margenBruto || 0).filter(m => m > 0);
  const avgMargin = margins.length ? Math.round(margins.reduce((a,b) => a+b, 0) / margins.length) : 0;

  document.getElementById('statTotal').textContent = allContracts.length;
  document.getElementById('statViable').textContent = viable.length;
  document.getElementById('statInterested').textContent = interested.length;
  document.getElementById('statAvgMargin').textContent = avgMargin ? '$' + avgMargin : '-';
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(el => {
    el.classList.toggle('active', el.textContent.trim() === getFilterLabel(f));
  });
  renderContracts();
}

function getFilterLabel(f) {
  const map = { all:'Todos', alerted:'Alertados', interested:'Interesados', pending_alert:'Pendientes',
                FEDERAL:'Federal', CT_STATE:'CT Estado', CT_MUNICIPAL:'Municipal' };
  return map[f] || f;
}

function filterContracts() {
  if (currentFilter === 'all') return allContracts;
  if (['FEDERAL','CT_STATE','CT_MUNICIPAL'].includes(currentFilter)) {
    return allContracts.filter(c => c.source === currentFilter);
  }
  return allContracts.filter(c => c.status === currentFilter);
}

function renderContracts() {
  const list = filterContracts();
  const el = document.getElementById('contractsList');

  if (list.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">&#x1F4ED;</div><h3>Sin contratos</h3><p>No hay contratos que coincidan con este filtro.</p></div>';
    return;
  }

  el.innerHTML = list.map(c => renderCard(c)).join('');
}

function renderQuantityRow(c) {
  const items = c.lineItems || c.offerData?.items || [];
  if (items.length === 1) {
    const qty = items[0].quantity || items[0].offer?.quantity || 1;
    if (qty > 1) return '<div class="cc-row"><span>Cantidad</span><strong>' + qty + ' unidades</strong></div>';
  }
  return '';
}

function renderLineItems(items) {
  if (!items || items.length <= 1) return '';
  let html = '<div style="margin-bottom:10px;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;font-size:11px;">';
  html += '<div style="display:grid;grid-template-columns:2fr 50px 80px 80px;gap:0;background:var(--dark);color:#fff;padding:6px 10px;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;">';
  html += '<span>Producto</span><span>Qty</span><span>Precio</span><span>Fuente</span></div>';
  for (const item of items) {
    const found = item.offer != null;
    const bg = found ? 'var(--white)' : 'var(--red-bg)';
    html += '<div style="display:grid;grid-template-columns:2fr 50px 80px 80px;gap:0;padding:5px 10px;border-top:1px solid var(--border);background:' + bg + ';">';
    html += '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + esc(item.description) + '">' + esc((item.description||'').substring(0,45)) + '</span>';
    html += '<span>' + (item.quantity||1) + '</span>';
    html += '<span>' + (found ? '$' + item.offer.precioTotal : '<span style="color:var(--red);">N/A</span>') + '</span>';
    html += '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (found ? esc((item.offer.fuente||'').substring(0,15)) : '-') + '</span>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderCard(c) {
  const calc = c.calculoData || {};
  const bench = c.benchmarkData || {};
  const offer = c.offerData || {};
  const sourceClass = c.source === 'FEDERAL' ? 'federal' : c.source === 'CT_STATE' ? 'ct-state' : 'ct-muni';
  const sourceIcon = c.source === 'FEDERAL' ? '&#x1F3DB;&#xFE0F;' : c.source === 'CT_STATE' ? '&#x1F3E6;' : '&#x1F3D8;&#xFE0F;';
  const sourceLabel = c.source === 'FEDERAL' ? 'FEDERAL' : c.source === 'CT_STATE' ? 'ESTADO CT' : 'MUNICIPAL';

  const riskBadge = calc.riesgo === 'BAJO' ? 'badge-green' : calc.riesgo === 'ALTO' ? 'badge-red' : 'badge-amber';
  const statusBadge = c.status === 'interested' ? 'badge-green' : c.status === 'alerted' ? 'badge-blue' : 'badge-gray';
  const statusLabel = c.status === 'interested' ? 'INTERESADO' : c.status === 'alerted' ? 'ALERTADO' : c.status === 'pending_alert' ? 'PENDIENTE' : c.status.toUpperCase();

  const deadline = c.responseDeadline?.toDate ? c.responseDeadline.toDate() : c.responseDeadline ? new Date(c.responseDeadline) : null;
  const deadlineStr = deadline ? deadline.toLocaleDateString('en-US', { month:'short', day:'numeric' }) : 'N/A';
  const diasR = c.diasRestantes || '?';

  const shippingWarn = calc.shippingWarning === 'FREIGHT'
    ? '<div class="cc-warning">&#x1F6A8; <div><strong>FREIGHT requerido</strong> (~' + (calc.shippingWeightLbs||'?') + 'lbs) — Confirma cotizacion real antes de someter.</div></div>'
    : calc.shippingWarning === 'HEAVY'
    ? '<div class="cc-warning">&#x26A0;&#xFE0F; <div><strong>Peso elevado</strong> (~' + (calc.shippingWeightLbs||'?') + 'lbs) — Verifica shipping real con UPS/FedEx.</div></div>'
    : '';

  const benchSection = bench.disponible
    ? '<div class="cc-row"><span>Precio historico</span><strong>$' + bench.precioMinimo + ' - $' + bench.precioMaximo + '</strong></div><div class="cc-row"><span>Competidores</span><strong>' + bench.competidoresPromedio + '</strong></div>'
    : '<div style="font-size:11px;color:var(--muted);font-style:italic;">Sin historial disponible</div>';

  return '<div class="contract-card" id="card_' + c.id + '">' +
    '<div class="cc-header" onclick="toggleCard(\'' + c.id + '\')">' +
      '<div class="cc-source ' + sourceClass + '">' + sourceIcon + '</div>' +
      '<div class="cc-title-area">' +
        '<div class="cc-title">' + esc(c.title || 'Sin titulo') + '</div>' +
        '<div class="cc-agency">' + esc(c.agency || '') + (c.municipio ? ' — ' + c.municipio : '') + '</div>' +
      '</div>' +
      '<div class="cc-badges">' +
        '<span class="badge ' + statusBadge + '">' + statusLabel + '</span>' +
        '<span class="badge badge-gray">' + sourceLabel + '</span>' +
        (calc.riesgo ? '<span class="badge ' + riskBadge + '">RIESGO ' + calc.riesgo + '</span>' : '') +
        '<span class="badge badge-gray">' + deadlineStr + ' (' + diasR + 'd)</span>' +
      '</div>' +
    '</div>' +
    '<div class="cc-body" id="body_' + c.id + '">' +
      '<div class="cc-grid">' +
        '<div class="cc-section"><h4>&#x1F4CB; Contrato</h4>' +
          '<div class="cc-row"><span>Agencia</span><strong>' + esc(c.agency) + '</strong></div>' +
          '<div class="cc-row"><span>Entrega</span><strong>' + esc(c.placeOfPerformance || 'N/A') + '</strong></div>' +
          '<div class="cc-row"><span>Deadline</span><strong>' + deadlineStr + ' (' + diasR + ' dias)</strong></div>' +
          '<div class="cc-row"><span>Set-aside</span><strong>' + esc(c.setAsideType || 'Open') + '</strong></div>' +
          (c.naicsCode ? '<div class="cc-row"><span>NAICS</span><strong>' + c.naicsCode + '</strong></div>' : '') +
        '</div>' +
        '<div class="cc-section"><h4>&#x1F4CA; Benchmark</h4>' + benchSection + '</div>' +
        '<div class="cc-section"><h4>&#x1F50D; Mejor Oferta' + (offer.multiItem ? ' <span class="badge badge-blue" style="margin-left:6px;">MULTI-ITEM</span>' : '') + '</h4>' +
          (offer.encontrada
            ? (offer.items && offer.items.length > 1 ? renderLineItems(offer.items) : '') +
              (offer.titulo ? '<div class="cc-row"><span>Producto</span><strong>' + esc(offer.titulo) + '</strong></div>' : '') +
              renderQuantityRow(c) +
              '<div class="cc-row"><span>Fuente</span><strong>' + esc(offer.fuente || '') + '</strong></div>' +
              '<div class="cc-row"><span>Precio unitario</span><strong>$' + (offer.precio||'N/A') + '</strong></div>' +
              '<div class="cc-row"><span>Precio total</span><strong>$' + (offer.precioTotal||'N/A') + '</strong></div>' +
              '<div class="cc-row"><span>Stock</span><strong>' + (offer.stock ? 'Disponible' : 'Verificar') + '</strong></div>' +
              '<div class="cc-row"><span>Entrega</span><strong>' + (offer.diasEntrega||'?') + ' dias</strong></div>' +
              (offer.categoria ? '<div class="cc-row"><span>Categoria</span><strong>' + esc(offer.categoria) + '</strong></div>' : '') +
              (offer.itemsFound != null ? '<div class="cc-row"><span>Items encontrados</span><strong>' + offer.itemsFound + ' de ' + (offer.itemsFound + (offer.itemsMissed||0)) + '</strong></div>' : '')
            : '<div style="font-size:11px;color:var(--muted);font-style:italic;">Sin oferta encontrada</div>') +
        '</div>' +
        '<div class="cc-section"><h4>&#x1F4B0; Calculo</h4>' +
          (calc.costoTotal
            ? '<div class="cc-row"><span>Costo producto</span><strong>$' + calc.costoProducto + '</strong></div>' +
              '<div class="cc-row"><span>Shipping</span><strong>$' + calc.shippingAlGobierno + ' (' + (calc.shippingSource||'est.') + ' ~' + (calc.shippingWeightLbs||'?') + 'lbs)</strong></div>' +
              '<div class="cc-row"><span>Costo total</span><strong>$' + calc.costoTotal + '</strong></div>' +
              '<div class="cc-row" style="border-top:1.5px solid var(--border);padding-top:6px;margin-top:4px;"><span style="font-weight:700;">Tu propuesta</span><strong style="color:var(--teal-d);font-size:14px;">$' + calc.propuestaOptima + '</strong></div>' +
              '<div class="cc-row"><span style="font-weight:700;">Margen neto</span><strong style="color:' + (calc.margenBruto >= 300 ? 'var(--green)' : 'var(--red)') + ';font-size:14px;">$' + calc.margenBruto + ' (' + calc.margenPorcentaje + '%)</strong></div>'
            : '<div style="font-size:11px;color:var(--muted);font-style:italic;">Sin calculo disponible</div>') +
        '</div>' +
      '</div>' +
      shippingWarn +
      '<div class="cc-actions">' +
        (c.sourceUrl ? '<a href="' + c.sourceUrl + '" target="_blank" class="btn btn-ghost">&#x1F4C4; Ver Contrato</a>' : '') +
        (offer.url ? '<a href="' + offer.url + '" target="_blank" class="btn btn-ghost">&#x1F6D2; Ver Producto</a>' : '') +
        (c.status !== 'interested'
          ? '<button class="btn btn-primary" onclick="markInterested(\'' + c.id + '\')">&#x2705; Me Interesa</button>'
          : '<span class="badge badge-green" style="padding:9px 18px;font-size:12px;">&#x2705; Marcado como interesado</span>') +
        (c.status !== 'ignored'
          ? '<button class="btn btn-red" onclick="markIgnored(\'' + c.id + '\')">&#x274C; Ignorar</button>'
          : '') +
      '</div>' +
    '</div>' +
  '</div>';
}

function toggleCard(id) {
  const body = document.getElementById('body_' + id);
  body.classList.toggle('open');
}

async function markInterested(id) {
  await db.collection('contracts').doc(id).update({ status: 'interested', updatedAt: new Date() });
  const c = allContracts.find(x => x.id === id);
  if (c) c.status = 'interested';
  updateStats();
  renderContracts();
}

async function markIgnored(id) {
  await db.collection('contracts').doc(id).update({ status: 'ignored', updatedAt: new Date() });
  allContracts = allContracts.filter(x => x.id !== id);
  updateStats();
  renderContracts();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function toggleAddForm() {
  const form = document.getElementById('addContractForm');
  form.style.display = form.style.display === 'none' ? '' : 'none';
}

async function saveManualContract() {
  const title = document.getElementById('addTitle').value.trim();
  const agency = document.getElementById('addAgency').value.trim();
  const deadline = document.getElementById('addDeadline').value;

  if (!title || !agency || !deadline) {
    alert('Completa titulo, agencia, y deadline.');
    return;
  }

  const btn = document.getElementById('btnSaveContract');
  btn.disabled = true; btn.textContent = 'Guardando...';

  try {
    const source = document.getElementById('addSource').value;
    const municipio = document.getElementById('addMunicipio').value;
    const now = new Date();
    const deadlineDate = new Date(deadline + 'T23:59:59');
    const diasRestantes = Math.ceil((deadlineDate - now) / (1000*60*60*24));
    const id = source + '_MANUAL_' + Date.now();

    const contract = {
      id: id,
      source: source,
      sourceUrl: document.getElementById('addUrl').value.trim() || '',
      noticeId: 'MANUAL-' + Date.now(),
      title: title,
      description: document.getElementById('addDesc').value.trim() || '',
      agency: agency,
      municipio: municipio,
      postedDate: now,
      responseDeadline: deadlineDate,
      diasRestantes: diasRestantes,
      naicsCode: '',
      setAsideType: '',
      placeOfPerformance: 'CT',
      contractValueMin: Number(document.getElementById('addValue').value) || null,
      contractValueMax: Number(document.getElementById('addValue').value) || null,
      status: 'qualified',
      disqualifyReason: null,
      lineItems: [],
      lineItemSource: 'manual',
      multiItem: false,
      benchmarkData: { disponible: false, precioPromedio: null, precioMinimo: null, precioMaximo: null, competidoresPromedio: null, ganadorFrecuente: null, fuente: null },
      offerData: { encontrada: false, fuente: null, precio: null, shipping: null, precioTotal: null, stock: false, diasEntrega: null, url: null, titulo: '', categoria: null, fuentesBuscadas: '', totalOfertas: 0, verificadoEn: now },
      calculoData: null,
      createdAt: now,
      updatedAt: now
    };

    await db.collection('contracts').doc(id).set(contract);

    // Clear form
    document.getElementById('addTitle').value = '';
    document.getElementById('addDesc').value = '';
    document.getElementById('addAgency').value = '';
    document.getElementById('addDeadline').value = '';
    document.getElementById('addUrl').value = '';
    document.getElementById('addValue').value = '';
    toggleAddForm();

    // Reload
    await loadContracts();
    alert('Contrato guardado. El pipeline buscara precios en el proximo ciclo.');
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Guardar Contrato';
  }
}
</script>
</body>
</html>
